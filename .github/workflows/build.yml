name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
          echo ""
          echo "=== File Type ==="
          file project.zip
          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Mengunci Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          else
            echo "[RESULT_ANALYZE]"
            echo "❌ pubspec.yaml tidak ditemukan."
            echo "[END_RESULT_ANALYZE]"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            timeout 120s flutter pub get || echo "⚠️ Lanjut..."
          fi

      - name: Patch awesome_notifications for Flutter 3.x
        run: |
          AWN_DIR=$(find $HOME/.pub-cache -path "*/awesome_notifications-0.9.3+1/android/src/main/java/me/carda/awesome_notifications" -type d 2>/dev/null | head -1)
          if [ -z "$AWN_DIR" ]; then
            echo "awesome_notifications not found, skipping"
            exit 0
          fi
          echo "Found: $AWN_DIR"

          # --- Patch FlutterBitmapUtils.java ---
          BITMAP="$AWN_DIR/FlutterBitmapUtils.java"
          if [ -f "$BITMAP" ]; then
            sed -i 's|import io.flutter.view.FlutterMain;|import io.flutter.FlutterInjector;|' "$BITMAP"
            sed -i 's|FlutterMain.getLookupKeyForAsset|FlutterInjector.instance().flutterLoader().getLookupKeyForAsset|g' "$BITMAP"
            echo "✅ Patched FlutterBitmapUtils.java"
          fi

          # --- Patch AwesomeNotificationsPlugin.java ---
          # FIX UTAMA: DelegatingMessageChannel sudah dihapus dari Flutter SDK.
          # Solusi: ganti seluruh method registerWith() menjadi stub kosong,
          # hapus semua import lama yang tidak ada lagi.
          PLUGIN="$AWN_DIR/AwesomeNotificationsPlugin.java"
          if [ -f "$PLUGIN" ]; then
            # Hapus import lama yang sudah tidak ada
            sed -i '/import io\.flutter\.plugin\.common\.PluginRegistry\.Registrar;/d' "$PLUGIN"
            sed -i '/import io\.flutter\.plugin\.common\.BasicMessageChannel\.DelegatingMessageChannel;/d' "$PLUGIN"

            # Ganti seluruh body registerWith() jadi stub kosong.
            # Script Python ditulis dalam SATU baris (base64-encoded) supaya
            # tidak ada masalah indentasi antara blok YAML dan sintaks Python.
            PATCH_PY_B64=""
            echo "$PATCH_PY_B64" | base64 -d > /tmp/patch_plugin.py
            python3 /tmp/patch_plugin.py "$PLUGIN"
            echo "✅ Patched AwesomeNotificationsPlugin.java"
          fi

          # --- Patch DartBackgroundExecutor.java ---
          DARTBG="$AWN_DIR/DartBackgroundExecutor.java"
          if [ -f "$DARTBG" ]; then
            sed -i '/import io\.flutter\.plugin\.common\.PluginRegistry\.PluginRegistrantCallback;/d' "$DARTBG"
            sed -i 's|private static io\.flutter\.plugin\.common\.PluginRegistry\.PluginRegistrantCallback|private static Runnable|' "$DARTBG"
            sed -i 's|io\.flutter\.plugin\.common\.PluginRegistry\.PluginRegistrantCallback callback)|Runnable callback)|g' "$DARTBG"
            echo "✅ Patched DartBackgroundExecutor.java"
          fi

          echo "✅ All patches done!"

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --${{ github.event.inputs.build_type }}
          else
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR" && chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
          fi

      - name: Check APK Output
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
